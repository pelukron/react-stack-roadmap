name: Hotfix Request
description: Critical fix that needs to go to production quickly
title: '[Hotfix] '
labels: ['🚨 hotfix']
body:
  - type: textarea
    id: problem
    attributes:
      label: What is broken?
      description: Describe the production issue and its impact.
    validations:
      required: true
  - type: textarea
    id: fix
    attributes:
      label: Proposed fix
      description: Describe the minimal fix required.
    validations:
      required: true
  - type: textarea
    id: verify
    attributes:
      label: Verification
      description: How will you verify the fix? Include test steps.
    validations:
      required: true
  - type: checkboxes
    id: urgency
    attributes:
      label: Urgency
      options:
        - label: This blocks a production release
        - label: This affects live users
        - label: Workaround exists
