name: Bug Report
description: Reporta un bug en el proyecto
title: '[Bug] '
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Describe el bug
      description: Descripción clara y concisa del problema.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Pasos para reproducir
      description: Pasos para reproducir el comportamiento.
      placeholder: |
        1. Ir a '...'
        2. Ejecutar '...'
        3. Ver error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
      description: Qué esperabas que sucediera.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Entorno
      description: OS, navegador, Node, pnpm, etc.
      placeholder: |
        - OS: Ubuntu 22.04
        - Node: 22.x
        - pnpm: 9.15.0
    validations:
      required: false
