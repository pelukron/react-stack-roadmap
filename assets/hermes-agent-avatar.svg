<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#2d1b69"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842"/>
      <stop offset="100%" style="stop-color:#e0a820"/>
    </linearGradient>
    <linearGradient id="wing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a830"/>
      <stop offset="100%" style="stop-color:#f5e6a3"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="124" fill="url(#bg)" stroke="#4a3080" stroke-width="4"/>

  <!-- Circuit pattern (subtle background) -->
  <g opacity="0.15" stroke="#b89bff" stroke-width="1.5" fill="none">
    <circle cx="60" cy="60" r="3"/><line x1="60" y1="60" x2="100" y2="60"/><circle cx="100" cy="60" r="2"/>
    <circle cx="196" cy="80" r="3"/><line x1="196" y1="80" x2="160" y2="80"/><circle cx="160" cy="80" r="2"/>
    <circle cx="80" cy="190" r="2"/><line x1="80" y1="190" x2="120" y2="190"/><circle cx="120" cy="190" r="1.5"/>
    <circle cx="176" cy="180" r="2.5"/><line x1="176" y1="180" x2="200" y2="180"/><circle cx="200" cy="180" r="2"/>
  </g>

  <!-- Left wing -->
  <path d="M40,140 Q30,100 50,70 Q65,55 85,65 L128,100 L128,130 Z"
        fill="url(#wing)" opacity="0.9"/>

  <!-- Right wing -->
  <path d="M216,140 Q226,100 206,70 Q191,55 171,65 L128,100 L128,130 Z"
        fill="url(#wing)" opacity="0.9"/>

  <!-- Wing feather details -->
  <g stroke="#8b6914" stroke-width="1" fill="none" opacity="0.4">
    <path d="M55,85 Q75,80 90,90"/>
    <path d="M50,105 Q75,100 95,108"/>
    <path d="M201,85 Q181,80 166,90"/>
    <path d="M206,105 Q181,100 161,108"/>
  </g>

  <!-- Center "H" letter (Hermes) -->
  <g transform="translate(128,140)">
    <!-- Left pillar -->
    <rect x="-30" y="-45" width="12" height="75" rx="3" fill="url(#gold)"/>
    <!-- Right pillar -->
    <rect x="18" y="-45" width="12" height="75" rx="3" fill="url(#gold)"/>
    <!-- Crossbar -->
    <rect x="-30" y="-8" width="60" height="10" rx="3" fill="url(#gold)"/>
  </g>

  <!-- Small caduceus / wing detail on H -->
  <g transform="translate(128,98)">
    <circle cx="0" cy="-5" r="10" fill="url(#gold)" opacity="0.3"/>
    <line x1="-15" y1="-15" x2="-5" y2="-10" stroke="#f5c842" stroke-width="2" stroke-linecap="round"/>
    <line x1="15" y1="-15" x2="5" y2="-10" stroke="#f5c842" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Subtle glow ring -->
  <circle cx="128" cy="128" r="120" fill="none" stroke="#f5c842" stroke-width="1" opacity="0.2"/>
</svg>